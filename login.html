<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostDoseRX - Login Success</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .success-icon {
            color: #10b981;
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        p {
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p id="message">Thank you for your purchase. Please authenticate with Google to access your premium PostDoseRX account.</p>
        
        <div id="google-signin" style="margin: 20px 0;">
            <!-- Google Sign-In button will be inserted here -->
        </div>
        
        <p style="font-size: 0.9rem; color: #9ca3af;">
            If you're not redirected automatically, you can 
            <a href="https://app.postdoserx.com" style="color: #667eea;">click here to continue</a>
        </p>
    </div>

    <script>
        console.log('=== LOGIN PAGE LOADED ===');
        console.log('Current URL:', window.location.href);
        
        // Check for returning user
        const returningUserEmail = localStorage.getItem('returning_user_email');
        console.log('Returning user email:', returningUserEmail);
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const stripeSuccess = urlParams.get('stripe_success');
        const sessionId = urlParams.get('session_id');
        
        console.log('URL parameters:');
        console.log('- stripe_success:', stripeSuccess);
        console.log('- session_id:', sessionId);
        console.log('- all params:', Object.fromEntries(urlParams.entries()));
        
        if (stripeSuccess === 'true' && sessionId) {
            console.log('Stripe success flow detected - storing session ID');
            // Store session ID for use during Google authentication
            localStorage.setItem('stripe_session_id', sessionId);
            document.getElementById('message').textContent = 
                'Thank you for your purchase. Please authenticate with Google to access your premium PostDoseRX account.';
        } else if (returningUserEmail) {
            console.log('Returning user detected:', returningUserEmail);
            // Returning user flow
            document.querySelector('.success-icon').textContent = '👋';
            document.querySelector('h1').textContent = 'Welcome Back!';
            document.getElementById('message').textContent = 
                `Hi! Please sign in with Google to continue to your personalized PostDoseRX dashboard.`;
        } else {
            console.log('Regular login flow (not from Stripe)');
            // Regular login (not from Stripe)
            document.querySelector('.success-icon').textContent = '🔐';
            document.querySelector('h1').textContent = 'Welcome to PostDoseRX';
            document.getElementById('message').textContent = 
                'Please authenticate with Google to access your PostDoseRX account.';
        }
        
        console.log('Initializing Google Sign-In...');
        // Always show Google Sign-In button
        initGoogleSignIn();

        async function initGoogleSignIn() {
            console.log('=== INITIALIZING GOOGLE SIGN-IN ===');
            try {
                console.log('Fetching config from API...');
                // Get Google Client ID from environment variables
                const configResponse = await fetch('https://app.postdoserx.com/api/config');
                console.log('Config response status:', configResponse.status);
                
                const config = await configResponse.json();
                console.log('Config response:', config);
                
                if (!config.googleClientId) {
                    throw new Error('Google Client ID not configured');
                }

                console.log('Loading Google Sign-In script...');
                // Load Google Sign-In script
                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.onload = () => {
                    console.log('Google API loaded, initializing...');
                    
                    if (!window.google || !window.google.accounts) {
                        console.error('Google API not properly loaded');
                        return;
                    }
                    
                    try {
                        window.google.accounts.id.initialize({
                            client_id: config.googleClientId,
                            callback: handleCredentialResponse
                        });

                        console.log('Google OAuth initialized successfully');

                        window.google.accounts.id.renderButton(
                            document.getElementById('google-signin'),
                            {
                                theme: 'outline',
                                size: 'large',
                                text: 'continue_with',
                                width: 300
                            }
                        );
                        
                        console.log('Google Sign-In button rendered');
                    } catch (initError) {
                        console.error('Error during Google initialization:', initError);
                    }
                };
                script.onerror = (error) => {
                    console.error('Failed to load Google API script:', error);
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('Failed to initialize Google Sign-In:', error);
                document.getElementById('google-signin').innerHTML = `
                    <p style="color: #dc2626;">Failed to load Google Sign-In. Please try again later.</p>
                `;
            }
        }

        async function handleCredentialResponse(response) {
            console.log('=== OAUTH CALLBACK STARTED ===');
            console.log('Response received:', response);
            
            try {
                // Decode JWT to get user info
                const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
                const sessionId = localStorage.getItem('stripe_session_id');
                
                console.log('Decoded user info:', userInfo);
                console.log('Stripe session ID from localStorage:', sessionId);
                
                const requestBody = {
                    email: userInfo.email,
                    name: userInfo.name,
                    provider: 'google',
                    stripe_session_id: sessionId,
                    returning_user: returningUserEmail === userInfo.email
                };
                
                console.log('Sending request to login API with body:', requestBody);
                
                // Send to login API with session ID
                const loginResponse = await fetch('https://app.postdoserx.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('Login API response status:', loginResponse.status);
                console.log('Login API response headers:', Object.fromEntries(loginResponse.headers.entries()));
                
                const result = await loginResponse.json();
                console.log('Login API response body:', result);

                if (result.requiresSignup && result.redirectUrl) {
                    console.log('No CRM contact — sending user to choose a plan:', result.redirectUrl);
                    console.log('🚨 REDIRECT_SIGNUP_REASON=GHL_NO_CONTACT');
                    window.location.href = result.redirectUrl;
                    return;
                }
                
                if (result.success) {
                    console.log('Login successful! Redirecting to:', result.redirectUrl);
                    console.log('✅ OAUTH_SUCCESS_REDIRECT_TO_APP');
                    
                    // Clear stored session ID
                    localStorage.removeItem('stripe_session_id');
                    
                    // Clear returning user flag since they're now authenticated
                    localStorage.removeItem('returning_user_email');
                    
                    // For returning users, ensure user email is set for dashboard
                    if (requestBody.returning_user) {
                        console.log('Restoring returning user data for:', userInfo.email);
                        localStorage.setItem('user_email', userInfo.email);
                    }
                    
                    // Redirect to dashboard with token
                    window.location.href = result.redirectUrl;
                } else {
                    console.error('Login API returned error:', result.error);
                    throw new Error(result.error || 'Login failed');
                }
            } catch (error) {
                console.error('=== OAUTH CALLBACK FAILED ===');
                console.error('Error details:', error);
                console.error('Error stack:', error.stack);
                
                document.getElementById('message').innerHTML = 
                    'Authentication failed. Please try again or <a href="https://app.postdoserx.com" style="color: #667eea;">continue to the app</a>.';
            }
        }
    </script>
</body>
</html>
